<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de jony</title>
  <link rel="stylesheet" href="flexbox.css">
</head>
<body>
  
  <div class="tarjeta">
    
    <!-- Sección superior: avatar + nombre -->
    <div class="perfil-header">
      <img src="https://i.pinimg.com/736x/ab/31/e6/ab31e62bf1d81d0336dddc1b93e57177.jpg" alt="Avatar" class="avatar de jony">
      <h1 class="nombre">Jony</h1>

    </div>
    
    <!-- Bio -->
    <p class="bio">
   soy un estudiante de programacion que le encanta aprender en clase cada dia.
    </p>
    
    <!-- Estadísticas -->
    <div class="estadisticas">
      <div class="stat">
    <span class="numero">1,250</span>
    <span class="texto">Seguidores</span>
  </div>

  <div class="stat">
    <span class="numero">3,800</span>
    <span class="texto">Visualizaciones</span>
  </div>

  <div class="stat">
    <span class="numero">980</span>
    <span class="texto">Siguiendo</span>
  </div>
    </div>
    
    <!-- Botones -->
    <div class="botones">
      <button class="seguir">Seguir</button>
      <button class="notificaciones">Activar notificaciones</button>
    </div>
    
    <!-- Miniaturas de proyectos -->
    <div class="miniaturas">
      <section class="galeria">
        <div class="tarjeta">
          <img src="https://picsum.photos/seed/a/300/200" alt="Producto 1">
        </div>
        <div class="tarjeta">
          <img src="https://picsum.photos/seed/b/300/200" alt="Producto 2">
        </div>
        <div class="tarjeta">
          <img src="https://picsum.photos/seed/c/300/200" alt="Producto 3">
        </div>
      </section>
    </div>
    
  </div>
</body>
</html>
